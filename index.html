<style>
body{
    font-family:comic;
    max-width:1200px;
    margin:auto;
    padding:20px;
    background:#9FE2BF;
}

#themeButton{
    position:fixed;
    top:15px;
    right:15px;
    width:auto;
    padding:10px 20px;
    z-index:1000;
}

@keyframes brolyPulse{
    0%{
        filter:brightness(100%);
    }

    25%{
        filter:brightness(150%);
    }

    50%{
        filter:brightness(200%);
    }

    75%{
        filter:brightness(160%);
    }

    100%{
        filter:brightness(100%);
    }
}

body.broly-mode{
    box-shadow:
        inset 0 0 80px #00ff00,
        inset 0 0 150px #00ff00;
}

@keyframes brolyShake{

    0%{transform:translate(0);}
    25%{transform:translate(1px,-1px);}
    50%{transform:translate(-1px,1px);}
    75%{transform:translate(1px,1px);}
    100%{transform:translate(0);}
}

body.broly-mode{
    animation:
        brolyPulse 0.8s infinite,
        brolyShake 0.08s infinite;
}

#particles{
    position:fixed;
    inset:0;
    pointer-events:none;
    overflow:hidden;
    z-index:999;
}

.particle{
    position:absolute;
    bottom:-20px;

    width:6px;
    height:6px;

    background:#00ff00;

    border-radius:50%;

    box-shadow:
        0 0 5px #00ff00,
        0 0 10px #00ff00,
        0 0 20px #00ff00;

    animation:floatUp linear forwards;
}

@keyframes floatUp{

    from{
        transform:
            translateY(0)
            scale(1);

        opacity:1;
    }

    to{
        transform:
            translateY(-120vh)
            scale(0);

        opacity:0;
    }

}
.section{
    background:#9FE2BF;
    padding:15px;
    margin-bottom:15px;
    border-radius:8px;
}

label{
    display:block;
    margin-top:10px;
}

input,select{
    width:100%;
    padding:6px;
}

button{
    margin-top:15px;
    padding:10px;
    width:100%;
}

pre{
    background:#111;
    color:#0f0;
    padding:15px;
    overflow:auto;
}
</style>
</head>

let currentTheme = 0;

function cycleTheme(){

    currentTheme =
    (currentTheme + 1) % themes.length;

    const theme =
    themes[currentTheme];

    document.body.style.background =
    theme.body;

    document.querySelectorAll(".section")
    .forEach(section => {
        section.style.background =
        theme.section;
    });

    if(theme.name === "Broly"){
    
    startBrolyParticles();
    document.body.classList.add("broly-mode");

    brolyMusic.play();

}else{

    stopBrolyParticles();
    document.body.classList.remove("broly-mode");

    brolyMusic.pause();
    brolyMusic.currentTime = 0;

}
}
let particleInterval;

function startBrolyParticles(){

    const container =
    document.getElementById("particles");

    particleInterval =
    setInterval(() => {

        const particle =
        document.createElement("div");

        particle.className =
        "particle";

        particle.style.left =
        Math.random() * 100 + "%";

        particle.style.animationDuration =
        (Math.random() * 3 + 2) + "s";

        container.appendChild(particle);

        particle.addEventListener(
            "animationend",
            () => particle.remove()
        );

    },50);

}

function stopBrolyParticles(){

    clearInterval(
        particleInterval
    );

    document.getElementById("particles")
    .innerHTML = "";

}
