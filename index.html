<style>
body{
    font-family:comic;
    max-width:1200px;
    margin:auto;
    padding:20px;
    background:#9FE2BF;
}

#themeButton{
    position:fixed;
    top:15px;
    right:15px;
    width:auto;
    padding:10px 20px;
    z-index:1000;
}

@keyframes brolyPulse{
    0%{
        filter:brightness(100%);
    }

    25%{
        filter:brightness(150%);
    }

    50%{
        filter:brightness(200%);
    }

    75%{
        filter:brightness(160%);
    }

    100%{
        filter:brightness(100%);
    }
}

body.broly-mode{
    box-shadow:
        inset 0 0 80px #00ff00,
        inset 0 0 150px #00ff00;
}

@keyframes brolyShake{

    0%{transform:translate(0);}
    25%{transform:translate(1px,-1px);}
    50%{transform:translate(-1px,1px);}
    75%{transform:translate(1px,1px);}
    100%{transform:translate(0);}
}

body.broly-mode{
    animation:
        brolyPulse 0.8s infinite,
        brolyShake 0.08s infinite;
}

#particles{
    position:fixed;
    inset:0;
    pointer-events:none;
    overflow:hidden;
    z-index:999;
}

.particle{
    position:absolute;
    bottom:-20px;

    width:8px;
    height:8px;

    background:#00ff00;

    border-radius:50%;

    box-shadow:
        0 0 5px #00ff00,
        0 0 10px #00ff00,
        0 0 20px #00ff00;

    animation:floatUp linear forwards;
}

@keyframes floatUp{

    from{
        transform:
            translateY(0)
            scale(1);

        opacity:1;
    }

    to{
        transform:
            translateY(-120vh)
            scale(0);

        opacity:0;
    }

}
.section{
    background:#9FE2BF;
    padding:15px;
    margin-bottom:15px;
    border-radius:8px;
}

label{
    display:block;
    margin-top:10px;
}

input,select{
    width:100%;
    padding:6px;
}

button{
    margin-top:15px;
    padding:10px;
    width:100%;
}

pre{
    background:#111;
    color:#0f0;
    padding:15px;
    overflow:auto;
}
</style>

let currentTheme = 0;

function cycleTheme(){

    currentTheme =
    (currentTheme + 1) % themes.length;

    const theme =
    themes[currentTheme];

    document.body.style.background =
    theme.body;

    document.querySelectorAll(".section")
    .forEach(section => {
        section.style.background =
        theme.section;
    });

    if(theme.name === "Broly"){
    
    startBrolyParticles();
    document.body.classList.add("broly-mode");


}else{

    stopBrolyParticles();
    document.body.classList.remove("broly-mode");


}
}
let particleInterval;

function startBrolyParticles(){

    const container =
    document.getElementById("particles");

    particleInterval =
    setInterval(() => {

        const particle =
        document.createElement("div");

        particle.className =
        "particle";

        particle.style.left =
        Math.random() * 100 + "%";

        particle.style.animationDuration =
        (Math.random() * 3 + 2) + "s";

        container.appendChild(particle);

        particle.addEventListener(
            "animationend",
            () => particle.remove()
        );

    },50);

}

function stopBrolyParticles(){

    clearInterval(
        particleInterval
    );

    document.getElementById("particles")
    .innerHTML = "";

}

    bpGainMultiplier:3.5
},

"Weighted T3":{
    strength:20,
    batchStrength:5,
    totalMultiplier:1.5
},

"Weighted T3 - Depleted":{
    batchStrength:5,
    bpGainMultiplier:3.5
},

"Weighted T4":{
    strength:20,
    batchStrength:5,
    totalMultiplier:1.2
},

"Weighted T4 - Depleted":{
    batchStrength:5,
    bpGainMultiplier:3.5
},

"Weighted T5+":{
    strength:20,
    batchStrength:5,
    totalMultiplier:1.1
}

};

//// M A G I C - R E F I N E M E N T

const MAGIC_DATA = {

"Magic Refinement - Novice":{
    magicMultiplier:1
},

"Magic Refinement - Average":{
    magicMultiplier:2
},

"Magic Refinement - Above Average":{
    magicMultiplier:3,
    rolls:1
},

"Magic Refinement - Expert":{
    magicMultiplier:4,
    rolls:1
},

"Magic Refinement - Arcana Maximum":{
    magicMultiplier:5,
    rolls:1
}

};

//
// INJURIES
//

const GRAVITY_INJURIES = [
"Minor Injury",
"Serious Injury (Life Threatening)",
"Critical Injury (Life Threatening)",
"Immediate Injury (Life Threatening)"
];

const ENERGY_INJURIES = {
1:"Simple Debilitating Injury.",
2:"Instability - EQ doubles or halves randomly per Ki Attack. Uncontrolled damage if doubling",
3:"Sensory De-sync - Rceive phantom senses, False Sounds, False Feelings behind you, False Touches",
4:"Backlash - Energy attacks are unstable, partially injure user and ignore Endurance.",
5:"Delayed Onset Ki Disorder!!! Lose ability to control energy all together for 8 sessions."
};

const MAGIC_CONSEQUENCES = {
"Magic Refinement - Above Average":1,
"Magic Refinement - Expert":1,
"Magic Refinement - Arcana Maximum":1
};

let gravityRolls = [];
let gravityInjuries = [];

let energyRolls = [];
let energyInjuries = [];

let magicRolls = [];
let magicFailures = 0;


//
// FINAL BP
//

if(WEIGHTED_DATA[training]){

const data = WEIGHTED_DATA[training];

strengthGain += data.strength || 0;
strengthGain += batches * (data.batchStrength || 0);

bpGainMultiplier += data.bpGainMultiplier || 0;
TotalBPMultiplier += data.totalMultiplier || 0;

}

if(GRAVITY_DATA[training]){

const data = GRAVITY_DATA[training];

bpGainMultiplier += data.bpGainMultiplier || 0;
TotalBPMultiplier += data.totalMultiplier || 0;

enduranceGain += data.endurance || 0;
enduranceGain2 += data.endurance2 || 0;

const gravityChoice =
document.getElementById("gravityChoice").value;

if(gravityChoice === "Endurance"){

    enduranceGain +=
    batches * (data.batchEndurance || 0);

}

else if(gravityChoice === "Strength"){

    strengthGain +=
    batches * (data.batchStrength || 0);

}

else if(gravityChoice === "Speed"){

    dexGain +=
    batches * (data.batchDex || 0);

}

extraPercentText = data.text || "";

for(let i = 0; i < (data.injuries || 0); i++){

    let roll =
    Math.floor(Math.random() * 6) + 1;

    gravityRolls.push(roll);

    if(roll === 1){

        let severity =
        gravityInjuries.length;

        severity =
        Math.min(
            severity,
            GRAVITY_INJURIES.length - 1
        );

        if(data.lifeThreatening){

    gravityInjuries.push(
        "Life Threatening Injury"
    );

    lifeThreateningCount++;
}else{

    gravityInjuries.push(
        GRAVITY_INJURIES[severity]
    );

if(
    GRAVITY_INJURIES[severity]
    .includes("Life Threatening")
){
    lifeThreateningCount++;
}
}

}

}
}

if(ENERGY_DATA[training]){

const data = ENERGY_DATA[training];

bpGainMultiplier += data.bpGainMultiplier || 0;
TotalBPMultiplier += data.totalMultiplier || 0;

eqGain += batches * (data.eqBatch || 0);

extraPercentText = data.text || "";

for(let i = 0; i < (data.injuries || 0); i++){

    let roll =
    Math.floor(Math.random() * 6) + 1;

    energyRolls.push(roll);

    if(roll === 1){

        let injuryRoll =
        Math.floor(Math.random() * 4) + 1;

        energyInjuries.push(
            ENERGY_INJURIES[injuryRoll]
        );
    }
    if(
    energyInjuries.length >= 3 &&
    !hasKiDisorder
){
    energyInjuries.push(
        "Delayed Onset Ki Disorder!!! Lose ability to control energy all together for 8 sessions."
    );

    hasKiDisorder = true;
}
}

}

if(MAGIC_DATA[training]){

    const data = MAGIC_DATA[training];

    let failThreshold = 0;

    switch(training){

        case "Magic Refinement - Above Average":
            failThreshold = 5;
            break;

        case "Magic Refinement - Expert":
            failThreshold = 15;
            break;

        case "Magic Refinement - Arcana Maximum":
            failThreshold = 30;
            break;
    }

    freePercent = 0;

    for(let i = 0; i < (data.rolls || 0); i++){

        const roll =
        Math.floor(Math.random() * 100) + 1;

        magicRolls.push(roll);

        if(roll <= failThreshold){
            magicFailures++;
        }
    }

    let multiplier = data.magicMultiplier;

    // Arcana failure becomes Expert rewards
    if(
        training === "Magic Refinement - Arcana Maximum" &&
        magicFailures > 0
    ){
        multiplier =
        MAGIC_DATA["Magic Refinement - Expert"]
        .magicMultiplier;
    }

    magicGain =
    totalTrainingPoints *
    multiplier;
}

if(HTC_DATA[htc]){

const data = HTC_DATA[htc];

bpGainMultiplier += data.bpGainMultiplier || 0;
TotalBPMultiplier += data.totalMultiplier || 0;

strengthGain += data.strength || 0;
dexGain += data.dex || 0;
enduranceGain += data.endurance || 0;
eqGain += data.eq || 0;
magicGain += data.magic || 0;

HTCpercent += data.htcPercent || 0;

if(data.text){
    extraPercentText += data.text + "\n";
}

}

permanentBPReduction =
Math.min(
    lifeThreateningCount * 0.07,
    0.15
);

if(hasKiDisorder){
    permanentBPReduction += 0.10;
}

let bpGain =
Math.floor(
totalTrainingPoints *
bpGainMultiplier
);

if(MAGIC_DATA[training]){

    bpGain = 0;
    freePercent = 0;

}

if(bpGainMultiplier <= 0)
    bpGainMultiplier = 1;

if(TotalBPMultiplier <= 0)
    TotalBPMultiplier = 1;

let finalBP =
(startingBP +
bpGain) * TotalBPMultiplier;

let adjustedFinalBP =
finalBP *
(1 - permanentBPReduction);

let EndFree =
(freePercent +
HTCpercent
);


//
// OUTPUT
//

output += "=== INPUT ===\n\n";

output += "Race: " + race + "\n";
output += "Subrace: " + subrace + "\n";
output += "Training: " + training + "\n";
output += "Stage: T" + stage + "\n";
output += "Tokens Used: " + tokens + "\n\n";

output += "=== MATH ===\n\n";

output +=
"Base Points = " +
tokens +
" × " +
pointsPerToken +
" = " +
(tokens * pointsPerToken) +
"\n";

output +=
"After Race Point Multipliers = " +
basePoints +
"\n";

output +=
"Bonus Batches = " +
batches +
"\n";

output +=
"Bonus Points = " +
bonusPoints +
"\n";

output +=
"Free % = " +
freePercent +
"\n\n";

output +=
"Base Training Point Gain = " +
totalTrainingPoints +
"\n";

output +=
"Training Point Multiplier = x" +
bpGainMultiplier +
"\n";

output +=
"Total Point Gain = " +
Math.trunc(bpGain) +
"\n\n";

output +=
"Additional End BP Multiplier = " +
"x" +
TotalBPMultiplier +
"\n\n";

output += "=== RESULT ===\n\n";

output +=
"Starting BP: " +
startingBP +
"\n";

output +=
"Final BP: " +
Math.trunc(finalBP) +
"\n\n";

if(permanentBPReduction > 0){

    output +=
    "Permanent BP Reduction: -" +
    (permanentBPReduction * 100).toFixed(0) +
    "%\n";

    output +=
    "Final BP (After Injury): " +
    Math.trunc(adjustedFinalBP) +
    "\n";

}else{

    output +=
"Raw Final BP: " +
Math.trunc(finalBP) +
"\n";

output +=
"Adjusted Final BP: " +
Math.trunc(adjustedFinalBP) +
"\n\n";

}

output +=
"Free Percentage: +" +
EndFree +
"%\n";

if(strengthGain)
output +=
"Strength Gain: +" +
strengthGain +
"%\n";

if(dexGain)
output +=
"Dexterity Gain: +" +
dexGain +
"%\n";

if(enduranceGain)
output +=
"Endurance Gain (<200% Endurance): +" +
enduranceGain +
"%\n";

if(enduranceGain2)
output +=
"Endurance Gain (200%+ Endurance): +" +
enduranceGain2 +
"%\n";

if(magicGain)
output +=
"Magic Gain: +" +
magicGain +
"%\n";

if(eqGain)
output +=
"Energy Quality Gain: +" +
eqGain +
"%\n";

if(gravityRolls.length){

    output += "\n=== GRAVITY ROLLS ===\n";

    gravityRolls.forEach((roll,index)=>{

        output +=
        "Roll " + 
        (index+1) +
        ": " +
        roll +
        "\n";
    });

}

    if(gravityInjuries.length){

        output +=
        "\nGravity Injuries Sustained:\n";

        gravityInjuries.forEach((injury,index)=>{

            output +=
            (index+1) +
            ". " +
            injury +
            "\n";
        });

        output +=
        "\nReminder:\n" +
        "-5% PL per injury\n" +
        "-50% Endurance gains\n" +
        "-10% BP per Life Threatening Injury\n" +
        "-25 Permanent Endurance per Life Threatening Injury\n" +
        "-7% Permanent Total BP per Life Threatening Injury (Max 15%)\n";
    }


if(energyRolls.length){

    output +=
    "\n=== ENERGY ROLLS ===\n";

    energyRolls.forEach((roll,index)=>{

        output +=
        "Roll " +
        (index+1) +
        ": " +
        roll +
        "\n";
    });

    if(energyInjuries.length){

        output +=
        "\nEnergy Injuries Sustained:\n";

        energyInjuries.forEach((injury,index)=>{

            output +=
            (index+1) +
            ". " +
            injury +
            "\n";
        });
    }
}


if(magicRolls.length){

    output +=
    "\n=== MAGIC ROLLS ===\n";

    magicRolls.forEach((roll,index)=>{

        output +=
        "Roll " +
        (index+1) +
        ": " +
        roll +
        "\n";
    });

    if(magicFailures){

    output +=
    "\nMystic Consequence Triggered!\n";

    if(
        training ===
        "Magic Refinement - Arcana Maximum"
    ){

        output +=
        "Arcana Maximum failed. Rewards reduced to Expert tier.\n";

    }

    output +=
    "Announce to Staff!\n";
}
    else{

        output +=
        "\nNo Mystic Consequences.\n";
    }
}


output += "\n" + extraPercentText;

output += "\n" + RaceText;


document.getElementById("results").innerText =
output;

}

document
.getElementById("race")
.addEventListener(
"change",
updateMenus
);

document
.getElementById("subrace")
.addEventListener(
"change",
updateTrainingMenu
);

updateMenus();

</script>

</body>
</html>
